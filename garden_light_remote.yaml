# ============================================================
# ESPHome config for TYWE3S driving a Hamulight L2446 remote
# directly via open-drain GPIO (no transistors).
#
# Wiring:
#   - Remove the remote's coin cell.
#   - Feed the remote's VCC from the ESP's 3.3V rail.
#   - Tie ESP GND <-> Remote GND.
#   - GPIO4  -> TOGGLE button pad
#   - GPIO0  -> BRIGHTER button pad
#   - GPIO5  -> DIMMER button pad
#
# How it works:
#   The GPIOs are configured as open-drain + inverted.
#   - "turn_on"  -> drives the pad LOW (button pressed)
#   - "turn_off" -> releases the pad (high-impedance); the remote's
#                   internal pull-up holds it at ~3.3V (button released)
#
# The TYWE3S is an ESP8266 (ESP8285 variant) with 1 MB flash.
# Use board: esp01_1m.
# ============================================================

substitutions:
  device_name: test_esphome
  friendly_name: "Garden Lights"
  # How long to hold each "button" - 120ms is plenty for the remote MCU
  # to register it as a press but not so long it looks like a long-press.
  press_duration: "120ms"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp8266:
  board: esp01_1m
  restore_from_flash: true

preferences:
  flash_write_interval: 1min

logger:
  level: INFO

# --- Home Assistant native API ---
api:
  encryption:
    key: <INSERT 32-BYTE HEX KEY HERE>

ota:
  - platform: esphome
    password: !secret ota_password

# --- Wi-Fi credentials (use !secret in production) ---
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Fallback hotspot if Wi-Fi is unreachable
  ap:
    ssid: "Garden-Light-Fallback"
    password: "garden1234"

captive_portal:

# Status LED on the TYWE3S onboard LED (GPIO2).
status_led:
  pin:
    number: GPIO2
    inverted: true

# ============================================================
# Open-drain GPIO outputs, one per remote button.
# `inverted: true` makes "turn_on" = pad driven LOW (pressed),
# "turn_off" = pad floating (released, held HIGH by remote pull-up).
# Idle state is released, so the remote sees no buttons pressed.
# ============================================================
output:
  - platform: gpio
    pin:
      number: GPIO4
      mode:
        output: true
        open_drain: true
      inverted: true
    id: out_toggle

  - platform: gpio
    pin:
      number: GPIO0
      mode:
        output: true
        open_drain: true
      inverted: true
    id: out_up

  - platform: gpio
    pin:
      number: GPIO5
      mode:
        output: true
        open_drain: true
      inverted: true
    id: out_down

# ============================================================
# Three buttons exposed to Home Assistant:
#   - Toggle (same single button as the physical remote)
#   - Brighter
#   - Dimmer
# ============================================================
button:
  - platform: template
    name: "Toggle"
    id: btn_toggle
    icon: mdi:lightbulb
    on_press:
      - output.turn_on: out_toggle
      - delay: ${press_duration}
      - output.turn_off: out_toggle

  - platform: template
    name: "Brighter"
    id: btn_up
    icon: mdi:brightness-7
    on_press:
      - output.turn_on: out_up
      - delay: ${press_duration}
      - output.turn_off: out_up

  - platform: template
    name: "Dimmer"
    id: btn_down
    icon: mdi:brightness-5
    on_press:
      - output.turn_on: out_down
      - delay: ${press_duration}
      - output.turn_off: out_down
